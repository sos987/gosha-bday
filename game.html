<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<link rel="shortcut icon" type="image/x-icon" href="https://www.minecraft.net/etc.clientlibs/minecraftnet/clientlibs/clientlib-site/resources/favicon.ico"/>
<title>Minecraft Mini Game</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#111;
  font-family:Arial,sans-serif;
  touch-action:none;
}

canvas{
  display:block;
  width:100vw;
  height:100vh;
  image-rendering:pixelated;
}

/* Minecraft UI */

#ui{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#topbar{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:20px;
  color:white;
  font-weight:bold;
  font-size:20px;
  text-shadow:3px 3px 0 #000;
}

#message{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(0,0,0,.75);
  color:white;
  font-size:64px;
  font-weight:bold;
  z-index:100;
  text-shadow:4px 4px 0 #000;
}

#message button{
  margin-top:20px;
  padding:16px 26px;
  font-size:24px;
  border:none;
  border-radius:10px;
  background:#55aa33;
  color:white;
  font-weight:bold;
  pointer-events:auto;
}

#mobileControls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  z-index:50;
}

.leftControls{
  display:flex;
  gap:15px;
}

.btn{
  width:82px;
  height:82px;
  border-radius:16px;
  background:rgba(255,255,255,.12);
  border:4px solid rgba(255,255,255,.25);
  backdrop-filter:blur(4px);
  color:white;
  font-size:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
}

.btn:active{
  transform:scale(.94);
}

@media (min-width: 900px){
  #mobileControls{
    display:none;
  }
}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">

  <div id="topbar">
    <div>TIME: <span id="time">0.0</span>s</div>
    <div>BEST: <span id="best">-</span></div>
  </div>

  <div id="message">
    <div id="messageText">YOU WIN</div>
    <button onclick="restart()">PLAY AGAIN</button>
  </div>

</div>

<div id="mobileControls">

  <div class="leftControls">
    <div class="btn" id="left">◀</div>
    <div class="btn" id="right">▶</div>
  </div>

  <div class="btn" id="jump">▲</div>

</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const TILE = 48;
const GRAVITY = 0.8;

let cameraX = 0;
let level = [];
let monsters = [];
let pits = [];

let currentLevel = 1;

let startTime = performance.now();

const player = {
  x:100,
  y:0,
  w:38,
  h:44,
  vx:0,
  vy:0,
  speed:5,
  jump:-15,
  onGround:false
};

const keys = {
  left:false,
  right:false
};

const levelUI = document.getElementById("level");
const timeUI = document.getElementById("time");
const bestUI = document.getElementById("best");

const message = document.getElementById("message");
const messageText = document.getElementById("messageText");

function restart(){
  message.style.display="none";
  generateLevel(currentLevel);
}

function win(){
  const total = ((performance.now()-startTime)/1000).toFixed(1);

  const best = localStorage.getItem("mc_best");

  if(!best || total < best){
    localStorage.setItem("mc_best", total);
  }

  messageText.innerHTML = "YOU WIN!";
  message.style.display="flex";

  updateBest();
}

function lose(){
  messageText.innerHTML = "GAME OVER";
  message.style.display="flex";
}

function updateBest(){
  bestUI.textContent = localStorage.getItem("mc_best") || "-";
}

updateBest();

function generateLevel(num){

  currentLevel = num;

  levelUI.textContent = num;

  level = [];
  monsters = [];
  pits = [];

  player.x = 100;
  player.y = 0;
  player.vx = 0;
  player.vy = 0;

  startTime = performance.now();

  const length = 80 + num * 10;

  for(let i=0;i<length;i++){

    if(Math.random() < 0.12 && i > 4){
      pits.push(i);
      continue;
    }

    const h = 2 + Math.floor(Math.random()*4);

    for(let y=0;y<h;y++){
      level.push({
        x:i*TILE,
        y:canvas.height-(y+1)*TILE
      });
    }

    if(Math.random() < 0.08 && i > 6){
      monsters.push({
        x:i*TILE,
        y:canvas.height-(h+1)*TILE,
        dir:Math.random() > .5 ? 1 : -1
      });
    }
  }

  goal = {
    x:(length-3)*TILE,
    y:canvas.height-6*TILE
  };
}

let goal = {};

generateLevel(1);

function rect(a,b){
  return(
    a.x < b.x+b.w &&
    a.x+a.w > b.x &&
    a.y < b.y+b.h &&
    a.y+a.h > b.y
  );
}

/* Desktop keyboard */

window.addEventListener("keydown", e=>{

  if(e.code==="ArrowLeft" || e.code==="KeyA"){
    keys.left=true;
  }

  if(e.code==="ArrowRight" || e.code==="KeyD"){
    keys.right=true;
  }

  if((e.code==="ArrowUp" || e.code==="Space" || e.code==="KeyW")
      && player.onGround){

    player.vy = player.jump;
  }
});

window.addEventListener("keyup", e=>{

  if(e.code==="ArrowLeft" || e.code==="KeyA"){
    keys.left=false;
  }

  if(e.code==="ArrowRight" || e.code==="KeyD"){
    keys.right=false;
  }
});

/* Mobile controls */

function mobileBtn(id,key){

  const el = document.getElementById(id);

  el.addEventListener("touchstart", e=>{
    e.preventDefault();
    keys[key]=true;
  },{passive:false});

  el.addEventListener("touchend", e=>{
    e.preventDefault();
    keys[key]=false;
  },{passive:false});
}

mobileBtn("left","left");
mobileBtn("right","right");

document.getElementById("jump")
.addEventListener("touchstart", e=>{

  e.preventDefault();

  if(player.onGround){
    player.vy = player.jump;
  }

},{passive:false});

function update(){

  player.vx = 0;

  if(keys.left){
    player.vx = -player.speed;
  }

  if(keys.right){
    player.vx = player.speed;
  }

  player.x += player.vx;

  player.vy += GRAVITY;
  player.y += player.vy;

  player.onGround = false;

  for(const b of level){

    const block = {
      x:b.x,
      y:b.y,
      w:TILE,
      h:TILE
    };

    if(rect(player,block)){

      if(player.vy >= 0 &&
         player.y + player.h - player.vy <= block.y + 10){

        player.y = block.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // monsters

  for(const m of monsters){

    m.x += m.dir * 1.5;

    if(Math.random() < .01){
      m.dir *= -1;
    }

    const monsterRect = {
      x:m.x,
      y:m.y,
      w:40,
      h:40
    };

    if(rect(player, monsterRect)){
      lose();
    }
  }

  // void death

  if(player.y > canvas.height + 300){
    lose();
  }

  // camera

  cameraX = player.x - canvas.width/3;

  // win

  const goalRect = {
    x:goal.x,
    y:goal.y,
    w:50,
    h:120
  };

  if(rect(player, goalRect)){
    win();
  }

  timeUI.textContent =
    ((performance.now()-startTime)/1000).toFixed(1);
}

function drawBlock(x,y,color1,color2){

  ctx.fillStyle=color1;
  ctx.fillRect(x,y,TILE,TILE);

  ctx.fillStyle=color2;

  ctx.strokeStyle="#000";
  ctx.strokeRect(x,y,TILE,TILE);
}

function draw(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // sky

  const sky = ctx.createLinearGradient(
    0,0,0,canvas.height
  );

  sky.addColorStop(0,"#7cc7ff");
  sky.addColorStop(1,"#d7f0ff");

  ctx.fillStyle = sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // clouds

  ctx.fillStyle="rgba(255,255,255,.7)";

  for(let i=0;i<6;i++){

    const cx = ((i*400)-cameraX*0.3)%3000;

    ctx.fillRect(cx,80,100,30);
    ctx.fillRect(cx+20,60,60,50);
  }

  ctx.save();

  ctx.translate(-cameraX,0);

  // world

  for(const b of level){

    const isTop =
      !level.find(v=>
        v.x===b.x &&
        v.y===b.y-TILE
      );

    if(isTop){
      drawBlock(b.x,b.y,"#7c4f28","#5e3818");

      ctx.fillStyle="#4caf50";
      ctx.fillRect(b.x,b.y,48,12);
    }else{
      drawBlock(b.x,b.y,"#777","#666");
    }
  }

  // goal

  ctx.fillStyle="gold";
  ctx.fillRect(goal.x,goal.y,14,120);

  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.moveTo(goal.x+14,goal.y);
  ctx.lineTo(goal.x+70,goal.y+20);
  ctx.lineTo(goal.x+14,goal.y+40);
  ctx.fill();

  // monsters

  for(const m of monsters){

    ctx.fillStyle="#2ecc71";
    ctx.fillRect(m.x,m.y,40,40);

    ctx.fillStyle="#111";

    ctx.fillRect(m.x+9,m.y+7,9,9);
    ctx.fillRect(m.x+24,m.y+7,9,9);
	
    ctx.fillRect(m.x+16,m.y+15,9,5);
	ctx.fillRect(m.x+12,m.y+19,17,7);
	ctx.fillRect(m.x+12,m.y+26,4,5);
	ctx.fillRect(m.x+25,m.y+26,4,5);
  }

  // player

  ctx.fillStyle="#FCC78E";
  ctx.fillRect(player.x,player.y,player.w,player.h);
  
  ctx.fillStyle="#6E5441";
  ctx.fillRect(player.x,player.y,player.w,12);
  ctx.fillRect(player.x,player.y+12,8,9);
  ctx.fillRect(player.x+30,player.y+12,8,9);
  
  ctx.fillStyle="#FFFFFF";
  ctx.fillRect(player.x+8,player.y+25,7,6);
  ctx.fillRect(player.x+22,player.y+25,7,6);

  ctx.fillStyle="#7476BE";
  ctx.fillRect(player.x+12,player.y+25,6,6);
  ctx.fillRect(player.x+20,player.y+25,6,6);

  ctx.restore();
}

function loop(){

  if(message.style.display !== "flex"){
    update();
  }

  draw();

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
